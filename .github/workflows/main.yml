# chzzk.py → Windows: dist/chzzk.exe / Linux: dist/chzzk
# Artifacts: Actions 탭에서 chzzk-windows-exe, chzzk-linux-bin

name: Build chzzk (Windows exe + Linux)

on:
  push:
    paths:
      - "chzzk.py"
      - "chzzk.spec"
      - ".github/workflows/build-chzzk.yml"
  pull_request:
    paths:
      - "chzzk.py"
      - "chzzk.spec"
      - ".github/workflows/build-chzzk.yml"
  workflow_dispatch: {}

concurrency:
  group: chzzk-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: chzzk-windows-exe
            out: chzzk.exe
          - os: ubuntu-22.04
            artifact: chzzk-linux-bin
            out: chzzk

    runs-on: ${{ matrix.os }}
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux GUI (tkinter) deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install PyInstaller
        run: |
          python -m pip install --upgrade pip
          python -m pip install "pyinstaller>=6.0" psutil

      - name: Build
        run: |
          pyinstaller --noconfirm --clean chzzk.spec

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.out }}
          if-no-files-found: error
